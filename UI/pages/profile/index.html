  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Synchronize nickname, avatar letter and level with localStorage
      const nickname = localStorage.getItem('hj_user_nickname') || '张先生';
      const userLevel = localStorage.getItem('hj_user_level') || '黄金会员';
      
      const nameEl = document.querySelector('.user-name');
      const avatarEl = document.querySelector('.user-avatar-text');
      const levelEl = document.querySelector('.user-level-tag');
      
      if (nameEl) nameEl.innerText = nickname;
      if (avatarEl && nickname.length > 0) avatarEl.innerText = nickname.charAt(0);
      if (levelEl) levelEl.innerText = userLevel;
    });
  </script>
