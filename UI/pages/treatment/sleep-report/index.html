<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>睡眠报告</title>
  <link rel="stylesheet" href="../../../css/app-styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
      -webkit-font-smoothing: antialiased;
      width: 100vw;
      height: 100vh;
      overflow-x: hidden;
    }
    body::-webkit-scrollbar {
      width: 4px;
    }
    body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 2px;
    }
    .period-btn.data-v-72813ef9 {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .book-btn.data-v-72813ef9 {
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .book-btn.data-v-72813ef9:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
    .trend-bar.data-v-72813ef9 {
      transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="page-pages page-pages-treatment-sleep-report-index">
  <div class="phone-screen page-pages-treatment-sleep-report-index">
    <div class="page data-v-72813ef9">
      
      <!-- Start Component hj-navbar -->
      <div class="component-hj-navbar">
        <div class="hj-navbar data-v-1529c78d is-fixed" style="height: 88px; background: #ffffff; border-bottom: 1px solid #f3f4f6;">
          <div class="data-v-1529c78d" style="height: 48px;"></div>
          <div class="hj-navbar-inner data-v-1529c78d" style="height: 40px;">
            <div class="hj-navbar-back data-v-1529c78d" style="color: #1f2937;" onclick="if(window.parent && window.parent.handleGoBack) { window.parent.handleGoBack(); } else { history.back(); }">
              <span class="hj-navbar-back-icon data-v-1529c78d" style="border-color: #1f2937;"></span>
            </div>
            <div class="hj-navbar-title data-v-1529c78d" style="color: #1f2937;">睡眠报告</div>
          </div>
        </div>
        <div class="data-v-1529c78d" style="height: 88px;"></div>
      </div>
      <!-- End Component hj-navbar -->

      <div class="page-content data-v-72813ef9">
        <!-- Period Switcher -->
        <div class="period-switch data-v-72813ef9">
          <div id="btn-week" class="period-btn data-v-72813ef9 active" onclick="switchPeriod('week')">过去7天</div>
          <div id="btn-month" class="period-btn data-v-72813ef9" onclick="switchPeriod('month')">过去30天</div>
        </div>

        <!-- Score Ring Card -->
        <div id="score-card" class="score-card data-v-72813ef9">
          <div class="score-ring data-v-72813ef9">
            <div id="score-num" class="score-num data-v-72813ef9">-</div>
            <div class="score-unit data-v-72813ef9">分</div>
          </div>
          <div class="score-info data-v-72813ef9">
            <span id="score-level" class="score-level data-v-72813ef9">-</span>
            <span id="score-period" class="score-period data-v-72813ef9">基于过去7天数据</span>
          </div>
          <div class="score-bar-wrap data-v-72813ef9">
            <div id="score-bar" class="score-bar data-v-72813ef9" style="width: 0%"></div>
          </div>
        </div>

        <!-- Core Metrics -->
        <div class="section-title data-v-72813ef9">核心指标</div>
        <div class="metrics-grid data-v-72813ef9">
          <div class="metric-card data-v-72813ef9">
            <span id="metric-duration" class="metric-val data-v-72813ef9">0h</span>
            <span class="metric-label data-v-72813ef9">平均佩戴时长</span>
            <div class="metric-bar data-v-72813ef9">
              <div id="metric-duration-bar" class="metric-fill data-v-72813ef9" style="width: 0%"></div>
            </div>
          </div>
          <div class="metric-card data-v-72813ef9">
            <span id="metric-compliance" class="metric-val data-v-72813ef9">0%</span>
            <span class="metric-label data-v-72813ef9">佩戴依从率</span>
            <div class="metric-bar data-v-72813ef9">
              <div id="metric-compliance-bar" class="metric-fill green data-v-72813ef9" style="width: 0%"></div>
            </div>
          </div>
          <div class="metric-card data-v-72813ef9">
            <span id="metric-comfort" class="metric-val data-v-72813ef9">0/5</span>
            <span class="metric-label data-v-72813ef9">平均舒适度</span>
            <div class="metric-bar data-v-72813ef9">
              <div id="metric-comfort-bar" class="metric-fill orange data-v-72813ef9" style="width: 0%"></div>
            </div>
          </div>
          <div class="metric-card data-v-72813ef9">
            <span id="metric-streak" class="metric-val data-v-72813ef9">0天</span>
            <span class="metric-label data-v-72813ef9">连续佩戴</span>
            <div class="metric-bar data-v-72813ef9">
              <div id="metric-streak-bar" class="metric-fill blue data-v-72813ef9" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <!-- Trend Chart -->
        <div class="section-title data-v-72813ef9">每日评分趋势</div>
        <div class="trend-chart data-v-72813ef9">
          <div class="trend-bars data-v-72813ef9" id="trend-bars-container"></div>
          <div class="trend-labels data-v-72813ef9" id="trend-labels-container"></div>
        </div>

        <!-- Peer Comparison -->
        <div class="section-title data-v-72813ef9">同类患者对比</div>
        <div class="peer-card data-v-72813ef9">
          <div class="peer-header data-v-72813ef9">
            <span id="peer-summary-text" class="peer-title data-v-72813ef9">您超过了 --% 的同类患者</span>
            <span class="peer-sub data-v-72813ef9">基于相同治疗方案的用户数据</span>
          </div>
          <div class="peer-bars data-v-72813ef9">
            <!-- Duration comparison -->
            <div class="peer-row data-v-72813ef9">
              <span class="peer-label data-v-72813ef9">平均佩戴时长</span>
              <div class="peer-bar-wrap data-v-72813ef9">
                <div id="peer-duration-you" class="peer-bar you data-v-72813ef9" style="width: 0%"></div>
                <div id="peer-duration-avg" class="peer-bar avg data-v-72813ef9" style="width: 0%"></div>
              </div>
              <span id="peer-duration-text" class="peer-val data-v-72813ef9">-h vs -h</span>
            </div>
            <!-- Compliance comparison -->
            <div class="peer-row data-v-72813ef9">
              <span class="peer-label data-v-72813ef9">依从率</span>
              <div class="peer-bar-wrap data-v-72813ef9">
                <div id="peer-compliance-you" class="peer-bar you green data-v-72813ef9" style="width: 0%"></div>
                <div id="peer-compliance-avg" class="peer-bar avg data-v-72813ef9" style="width: 0%"></div>
              </div>
              <span id="peer-compliance-text" class="peer-val data-v-72813ef9">-% vs -%</span>
            </div>
          </div>
          <div class="peer-legend data-v-72813ef9">
            <span class="legend-dot you data-v-72813ef9"></span> 您
            <span class="legend-dot avg data-v-72813ef9"></span> 平均水平
          </div>
        </div>

        <!-- AI Insights -->
        <div class="section-title data-v-72813ef9">AI 健康洞察</div>
        <div class="insights data-v-72813ef9" id="insights-container"></div>

        <!-- Low Comfort Booking Button -->
        <div class="book-btn-wrap data-v-72813ef9" id="book-btn-container" style="display: none;">
          <div class="book-btn data-v-72813ef9" onclick="goToAppointment()">
            <span class="book-btn-text data-v-72813ef9">预约医生调整设备</span>
          </div>
        </div>

        <div class="safe-bottom data-v-72813ef9"></div>
      </div>
    </div>
  </div>

  <script>
    // Mock records from index.js
    const weekData = {
      compliance: 85,
      weekAvg: 6.2,
      avgComfort: 3.8,
      streak: 12,
      betterThan: 78,
      avgDuration: 5.8,
      avgCompliance: 72,
      dailyScores: [
        { date: "6/01", score: 72 },
        { date: "6/02", score: 80 },
        { date: "6/03", score: 68 },
        { date: "6/04", score: 85 },
        { date: "6/05", score: 91 },
        { date: "6/06", score: 78 },
        { date: "6/07", score: 88 }
      ]
    };

    // To simulate the "low comfort" button, we intentionally set monthly comfort to 2.4 (<3)
    const monthData = {
      compliance: 78,
      weekAvg: 5.9,
      avgComfort: 2.4, // Lower than 3, will trigger appointment button!
      streak: 26,
      betterThan: 71,
      avgDuration: 5.8,
      avgCompliance: 72,
      dailyScores: [
        { date: "5/10", score: 72 },
        { date: "5/12", score: 80 },
        { date: "5/14", score: 68 },
        { date: "5/16", score: 85 },
        { date: "5/18", score: 91 },
        { date: "5/20", score: 78 },
        { date: "5/22", score: 88 },
        { date: "5/24", score: 65 },
        { date: "5/26", score: 80 },
        { date: "5/28", score: 88 },
        { date: "5/30", score: 70 },
        { date: "6/01", score: 82 },
        { date: "6/03", score: 75 },
        { date: "6/05", score: 78 }
      ]
    };

    let activePeriod = "week";

    document.addEventListener("DOMContentLoaded", () => {
      renderPage();
    });

    function switchPeriod(period) {
      if (activePeriod === period) return;
      activePeriod = period;

      document.getElementById("btn-week").classList.toggle("active", period === "week");
      document.getElementById("btn-month").classList.toggle("active", period === "month");

      renderPage();
    }

    function renderPage() {
      const data = activePeriod === "week" ? weekData : monthData;
      
      // Calculate overall health score
      const healthScore = Math.min(
        100,
        Math.round(0.4 * data.compliance + (data.weekAvg / 8) * 100 * 0.4 + (data.avgComfort / 5) * 100 * 0.2)
      );

      // Determine level configuration
      let levelLabel = "一般";
      let levelColor = "#F59E0B";
      let levelBg = "#FFFBEB";
      if (healthScore >= 90) {
        levelLabel = "优秀";
        levelColor = "#1A9D5C";
        levelBg = "#D3F5E3";
      } else if (healthScore >= 75) {
        levelLabel = "良好";
        levelColor = "#3B6BF5";
        levelBg = "#EEF4FF";
      } else if (healthScore < 60) {
        levelLabel = "需改善";
        levelColor = "#EF4444";
        levelBg = "#FEE2E2";
      }

      // 1. Update score cards
      document.getElementById("score-card").style.background = levelColor;
      const scoreNum = document.getElementById("score-num");
      scoreNum.textContent = healthScore;
      scoreNum.style.color = levelColor;

      const scoreLevel = document.getElementById("score-level");
      scoreLevel.textContent = levelLabel;
      scoreLevel.style.color = levelColor;
      scoreLevel.style.background = levelBg;
      scoreLevel.style.padding = "2px 8px";
      scoreLevel.style.borderRadius = "4px";

      document.getElementById("score-period").textContent = `基于过去${activePeriod === "week" ? "7" : "30"}天数据`;
      document.getElementById("score-bar").style.width = `${healthScore}%`;
      document.getElementById("score-bar").style.background = levelColor;

      // 2. Update core metrics grid
      document.getElementById("metric-duration").textContent = `${data.weekAvg}h`;
      document.getElementById("metric-duration-bar").style.width = `${(data.weekAvg / 8) * 100}%`;

      document.getElementById("metric-compliance").textContent = `${data.compliance}%`;
      document.getElementById("metric-compliance-bar").style.width = `${data.compliance}%`;

      document.getElementById("metric-comfort").textContent = `${data.avgComfort}/5`;
      document.getElementById("metric-comfort-bar").style.width = `${(data.avgComfort / 5) * 100}%`;

      document.getElementById("metric-streak").textContent = `${data.streak}天`;
      document.getElementById("metric-streak-bar").style.width = `${Math.min(100, (data.streak / 30) * 100)}%`;

      // 3. Render Trend Bar Chart
      const maxVal = Math.max(...data.dailyScores.map(s => s.score), 100);
      const barsContainer = document.getElementById("trend-bars-container");
      const labelsContainer = document.getElementById("trend-labels-container");

      barsContainer.innerHTML = data.dailyScores.map(s => {
        let color = "#EF4444";
        if (s.score >= 80) {
          color = "#1A9D5C";
        } else if (s.score >= 60) {
          color = "#F59E0B";
        }
        const heightPercent = (s.score / maxVal) * 100;
        return `<div class="trend-bar data-v-72813ef9" style="height: ${heightPercent}%; background: ${color};" title="评分: ${s.score}"></div>`;
      }).join("");

      labelsContainer.innerHTML = data.dailyScores.map(s => {
        return `<span class="trend-label data-v-72813ef9">${s.date}</span>`;
      }).join("");

      // 4. Update Peer Comparison
      document.getElementById("peer-summary-text").textContent = `您超过了 ${data.betterThan}% 的同类患者`;
      
      const yourDurationPct = Math.min(100, Math.round((data.weekAvg / 8) * 100));
      const avgDurationPct = Math.min(100, Math.round((data.avgDuration / 8) * 100));
      document.getElementById("peer-duration-you").style.width = `${yourDurationPct}%`;
      document.getElementById("peer-duration-avg").style.width = `${avgDurationPct}%`;
      document.getElementById("peer-duration-text").textContent = `${data.weekAvg}h vs ${data.avgDuration}h`;

      document.getElementById("peer-compliance-you").style.width = `${data.compliance}%`;
      document.getElementById("peer-compliance-avg").style.width = `${data.avgCompliance}%`;
      document.getElementById("peer-compliance-text").textContent = `${data.compliance}% vs ${data.avgCompliance}%`;

      // 5. Generate AI insights list
      const insightsContainer = document.getElementById("insights-container");
      const insights = [];

      if (data.compliance >= 85) {
        insights.push({ icon: "✅", text: `您的佩戴依从率达到 ${data.compliance}%，远超平均水平，继续保持！`, type: "good" });
      } else if (data.compliance < 60) {
        insights.push({ icon: "⚠️", text: `近期依从率仅 ${data.compliance}%，建议设置手机打卡提醒以免漏戴。`, type: "warn" });
      }

      if (data.weekAvg >= 7) {
        insights.push({ icon: "💤", text: `平均佩戴时长达 ${data.weekAvg}h，已达到理疗标准，有助深度稳控呼吸。`, type: "good" });
      } else if (data.weekAvg < 5) {
        insights.push({ icon: "📉", text: `平均佩戴仅 ${data.weekAvg}h，建议提早佩戴，保持每晚 6 小时以上以保障气道开放。`, type: "warn" });
      }

      if (data.avgComfort >= 4) {
        insights.push({ icon: "😊", text: `设备舒适度评分 ${data.avgComfort}/5，目前物理适配度非常契合。`, type: "good" });
      } else if (data.avgComfort < 3) {
        insights.push({ icon: "⚠️", text: `近期舒适度评分较低（${data.avgComfort}/5），建议联系医生调整下颌前伸螺丝阻尼。`, type: "warn" });
      }

      insights.push({ icon: "💡", text: "建议每周保持至少6晚佩戴频率。长期、持续使用有利于呼吸暂停恢复及消除呼噜声。", type: "info" });

      insightsContainer.innerHTML = insights.map(ins => {
        return `
          <div class="insight-card data-v-72813ef9 insight--${ins.type}">
            <span class="insight-icon data-v-72813ef9">${ins.icon}</span>
            <span class="insight-text data-v-72813ef9">${ins.text}</span>
          </div>
        `;
      }).join("");

      // 6. Show or hide appointment button if comfort is low
      const showBookBtn = data.avgComfort < 3;
      document.getElementById("book-btn-container").style.display = showBookBtn ? "block" : "none";
    }

    function goToAppointment() {
      if (window.parent && window.parent.handleGoToPage) {
        window.parent.handleGoToPage('/pages/appointment/index');
      } else {
        window.location.href = '../../appointment/index.html';
      }
    }
  </script>
</body>
</html>
