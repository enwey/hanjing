<body class="page-pages page-pages-product-detail-index">

    <div class="page data-v-02d25a67">
      <!-- Start Component hj-navbar -->
      <div class="component-hj-navbar">
        <div class="hj-navbar data-v-1529c78d is-fixed" style="height: 88px; background: #ffffff; border-bottom: 1px solid #f3f4f6;">
          <div class="data-v-1529c78d" style="height: 48px;"></div>
          <div class="hj-navbar-inner data-v-1529c78d" style="height: 40px;">
            <div class="hj-navbar-back data-v-1529c78d" style="color: #1f2937;" onclick="if(window.parent && window.parent.handleGoBack) { window.parent.handleGoBack(); } else { history.back(); }">
              <span class="hj-navbar-back-icon data-v-1529c78d" style="border-color: #1f2937;"></span>

          </div>
        </div>
        <div class="data-v-1529c78d" style="height: 88px;"></div>
      </div>
      <!-- End Component hj-navbar -->

      <div class="page-content data-v-02d25a67" style="padding-bottom: 80px;">
        <div class="product-hero data-v-02d25a67">
          <img id="product-hero-img" class="hero-img data-v-02d25a67" style="width: 100%; height: 300px; object-fit: cover;" src="../../../static/product/hj-mad-03.png" alt="hero image" />
          <div id="hero-badge" class="hero-badge data-v-02d25a67">热销商品</div>
        </div>

        <div class="info-card data-v-02d25a67">
          <div class="price-row data-v-02d25a67">
            <span id="price-val" class="price data-v-02d25a67">¥1,980.00</span>
            <span id="price-orig" class="price-original data-v-02d25a67">¥2,480.00</span>
            <span id="sales-val" class="sales data-v-02d25a67">已售 1,280+</span>
          </div>
          <span id="product-name" class="product-name data-v-02d25a67">鼾静智能固位下颌前移固磁阻鼾器（标准版）</span>
          <span id="product-desc" class="product-desc data-v-02d25a67">
            采用高分子医用生物材料，精准咬合设计，通过微调前移下颌骨以拓宽咽部气道，缓解夜间打鼾。
          </span>
        </div>

        <div class="section-card data-v-02d25a67">
          <span class="section-title data-v-02d25a67">产品规格</span>
          <div id="specs-container">
            <!-- Populated dynamically -->
          </div>
        </div>

        <div class="section-card data-v-02d25a67">
          <span class="section-title data-v-02d25a67">产品详情</span>
          <span id="detail-text" class="detail-text data-v-02d25a67">
            鼾静智能固磁阻鼾器配备磁吸式智能充电仓与自动烘干杀菌功能，是您出差、旅行、居家的理想伴侣。
          </span>
        </div>
        <div class="safe-bottom data-v-02d25a67"></div>
      </div>

      <div class="buy-bar data-v-02d25a67">
        <div class="cart-btn data-v-02d25a67" onclick="addToCart()">
          <span id="commission-btn-text" class="cart-btn-text data-v-02d25a67">赚佣金 ¥198.00</span>
        </div>
        <div class="buy-btn data-v-02d25a67" onclick="buyNow()">
          <span class="buy-btn-text data-v-02d25a67">立即购买</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const products = {
      'prod-001': {
        name: '鼾静智能固位下颌前移固磁阻鼾器（标准版）',
        price: '¥1,980.00',
        originalPrice: '¥2,480.00',
        sales: '1,280+',
        desc: '通过微调前移下颌骨以拓宽咽部气道，有效缓解夜间睡眠打鼾及轻中度呼吸暂停。本款配备磁吸式智能充电仓与自动烘干杀菌功能。',
        detail: '鼾静智能下颌前移阻鼾器（HJ-MAD-03）采用高分子医用生物材料，精准咬合设计。防尘防潮，便捷耐用，是您出差、旅行、居家的理想伴侣。',
        image: '../../../static/product/hj-mad-03.png',
        badge: '热销商品',
        commission: '¥198.00',
        specs: [
          { label: '品牌', value: '鼾静健康 (Hanjing)' },
          { label: '型号', value: 'HJ-MAD-03' },
          { label: '材质', value: '医用高分子生物材料' },
          { label: '包装', value: '标准礼盒装 (阻鼾器 + 充电仓)' }
        ]
      },
      'prod-002': {
        name: '睡眠冷敷凝胶',
        price: '¥58.00',
        originalPrice: '¥88.00',
        sales: '3,500+',
        desc: '通过物理降温与温和的植物草本提取物，舒缓咽部粘膜，辅助改善局部呼吸道干燥。',
        detail: '鼾静专研睡眠冷敷凝胶使用简单，睡前涂抹于人中或前颈部，清凉舒适，辅助进入深度睡眠。',
        image: '../../../static/product/screening.png',
        badge: '新品推荐',
        commission: '¥5.80',
        specs: [
          { label: '品牌', value: '鼾静健康 (Hanjing)' },
          { label: '规格', value: '50g / 支' },
          { label: '适用人群', value: '因呼吸道干燥、气道发痒导致易醒/打鼾者' },
          { label: '保质期', value: '24个月' }
        ]
      },
      'prod-003': {
        name: '鼾静阻鼾器专用清洁片（30片/盒）',
        price: '¥39.00',
        originalPrice: '¥59.00',
        sales: '5,600+',
        desc: '阻鼾器专用清洁泡腾片，专为HJ系列高分子材质定制。采用多重活性氧生物配方，浸泡5分钟瓦解蛋白。',
        detail: '温和配方，不伤材质，口腔更卫生。每周用清洁片浸泡1次进行深度杀菌。',
        image: '../../../static/product/clean-kit.png',
        badge: '超值配件',
        commission: '¥3.90',
        specs: [
          { label: '品牌', value: '鼾静健康 (Hanjing)' },
          { label: '规格', value: '30片 / 盒' },
          { label: '使用方法', value: '温水浸泡5-10分钟后冲洗' }
        ]
      },
      'prod-004': {
        name: '智能睡眠监测手环',
        price: '¥399.00',
        originalPrice: '¥599.00',
        sales: '850+',
        desc: '内置高灵敏三轴运动传感器与PPG光学血氧监测仪，精准记录整晚睡眠时长、深睡/浅睡比例及血氧。',
        detail: '独创打鼾震动干预模式，当监测到频繁打鼾伴血氧走低时，手环会发出微振，提醒调整睡姿，保护睡眠呼吸通畅。',
        image: '../../../static/product/pillow.png',
        badge: '智能硬件',
        commission: '¥39.90',
        specs: [
          { label: '品牌', value: '鼾静健康 (Hanjing)' },
          { label: '传感器', value: '三轴运动传感器 + PPG血氧监测' },
          { label: '续航时间', value: '约7-10天' },
          { label: '兼容平台', value: 'iOS 9.0+ / Android 5.0+' }
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const prodId = params.get('id') || 'prod-001';
    const data = products[prodId] || products['prod-001'];

    // Hydrate
    document.getElementById('product-hero-img').src = data.image;
    document.getElementById('hero-badge').textContent = data.badge;
    document.getElementById('price-val').textContent = data.price;
    document.getElementById('price-orig').textContent = data.originalPrice;
    document.getElementById('sales-val').textContent = `已售 ${data.sales}`;
    document.getElementById('product-name').textContent = data.name;
    document.getElementById('product-desc').textContent = data.desc;
    document.getElementById('detail-text').textContent = data.detail;
    document.getElementById('commission-btn-text').textContent = `赚佣金 ${data.commission}`;

    const specsContainer = document.getElementById('specs-container');
    specsContainer.innerHTML = '';
    data.specs.forEach(s => {
      const row = document.createElement('div');
      row.className = 'spec-row data-v-02d25a67';
      
      const label = document.createElement('span');
      label.className = 'spec-label data-v-02d25a67';
      label.textContent = s.label;
      
      const val = document.createElement('span');
      val.className = 'spec-value data-v-02d25a67';
      val.textContent = s.value;
      
      row.appendChild(label);
      row.appendChild(val);
      specsContainer.appendChild(row);
    });

    function addToCart() {
      alert(`已成功复制推广链接！您可以分享此商品，购买成功后将获得 ${data.commission} 推广佣金！`);
    }

    function buyNow() {
      // Generate a new custom order in localStorage
      const randomSuffix = String(Math.floor(1000 + Math.random() * 9000));
      const orderNo = `OR20260616${randomSuffix}`;
      const newOrder = {
        id: `ord-${Date.now()}`,
        orderNo: orderNo,
        status: "paid",
        statusLabel: "待发货",
        statusColor: "#3b6bf5",
        items: [
          { name: data.name, image: data.image, qty: 1, price: data.price }
        ],
        totalQty: 1,
        totalAmount: data.price
      };

      try {
        let customOrders = [];
        const stored = localStorage.getItem('hj_custom_orders');
        if (stored) customOrders = JSON.parse(stored);
        customOrders.unshift(newOrder);
        localStorage.setItem('hj_custom_orders', JSON.stringify(customOrders));
      } catch (e) {}

      alert(`已成功创建订单！购买商品：${data.name}，实付金额：${data.price}。`);
      window.parent.loadPage('pages/order/index');
    }
  </script>
</body>
</html>
