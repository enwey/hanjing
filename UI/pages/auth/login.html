<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信授权登录</title>
  <link rel="stylesheet" href="../../css/app-styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
      -webkit-font-smoothing: antialiased;
      width: 100vw;
      height: 100vh;
      overflow-x: hidden;
    }
    /* Hide scrollbar defaults inside simulated screen if needed */
    body::-webkit-scrollbar {
      width: 4px;
    }
    body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 2px;
    }
  </style>
</head>
<body class="page-pages page-pages-auth-login">
  <div class="phone-screen page-pages-auth-login">
          <div class="page-container">
  <!-- Start Component hj-navbar -->
<div class="component-hj-navbar">
  <div class="hj-navbar data-v-1529c78d is-fixed" style="height: 88px; background: #ffffff; border-bottom: 1px solid #f3f4f6;">
    <div class="data-v-1529c78d" style="height: 48px;"></div>
    <div class="hj-navbar-inner data-v-1529c78d" style="height: 40px;">
      <div class="hj-navbar-back data-v-1529c78d" style="color: #1f2937;" onclick="if(window.parent && window.parent.handleGoBack) { window.parent.handleGoBack(); } else { history.back(); }">
        <span class="hj-navbar-back-icon data-v-1529c78d" style="border-color: #1f2937;"></span>
      </div>
      <div class="hj-navbar-title data-v-1529c78d" style="color: #1f2937;">微信授权登录</div>
    </div>
  </div>
  <div class="data-v-1529c78d" style="height: 88px;"></div>
</div>
<!-- End Component hj-navbar -->
  <div class="page-content login-page">
    <div class="brand-section">
      <div class="logo-container">
        <span class="logo-emoji">💤</span>
      </div>
      <span class="brand-name">鼾静健康诊所</span>
      <span class="brand-slogan">专注睡眠呼吸健康 · 让每一个夜晚安宁无声</span>
    </div>
    
    <div class="auth-section">
      <div class="auth-tip-card">
        <div class="tip-header">
          <span class="tip-icon">🔒</span>
          <span class="tip-title">安全授权提示</span>
        </div>
        <span class="tip-content">根据国家网络安全法及就诊真实性要求，预约挂号、病历管理、睡眠监测等功能需绑定您的手机号码。</span>
      </div>
      
      <button 
        class="auth-btn" 
        onclick="doLogin()"
      >
        微信手机号一键登录
      </button>
      
      <button class="cancel-btn" onclick="doCancel()">
        暂不登录
      </button>
    </div>
    
    <div class="protocol-section">
      <span class="protocol-text">登录即代表您同意 </span>
      <span class="protocol-link" onclick="alert('《用户协议》阅读成功！')">《用户协议》</span>
      <span class="protocol-text">与</span>
      <span class="protocol-link" onclick="alert('《隐私政策》阅读成功！')">《隐私政策》</span>
    </div>
  </div>

        <div class="safe-bottom" style="height: 34px;"></div>
      </div>

<script>
  function doLogin() {
    localStorage.setItem('access_token', 'mock-token-123456');
    localStorage.setItem('user_phone', '13888888888');
    alert('登录成功！');
    if (window.parent && window.parent.handleGoBack) {
      window.parent.handleGoBack();
    } else {
      history.back();
    }
  }

  function doCancel() {
    if (window.parent && window.parent.handleGoBack) {
      window.parent.handleGoBack();
    } else {
      history.back();
    }
  }
</script>
</body>
</html>
