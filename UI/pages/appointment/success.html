<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约成功</title>
  <link rel="stylesheet" href="../../css/app-styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
      -webkit-font-smoothing: antialiased;
      width: 100vw;
      height: 100vh;
      overflow-x: hidden;
    }
    body::-webkit-scrollbar {
      width: 4px;
    }
    body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 2px;
    }
    .success-icon.data-v-baa6e4ef {
      display: flex;
      justify-content: center;
      padding: 40px 0 16px;
    }
    .hj-button.data-v-f6f93744 {
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.15s ease;
    }
    .hj-button.data-v-f6f93744:active {
      transform: scale(0.99);
      opacity: 0.95;
    }
    /* Animated SVG checkmark styling */
    .checkmark-svg {
      width: 80px;
      height: 80px;
      display: block;
    }
    .checkmark-circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke-miterlimit: 10;
      stroke: #1a9d5c;
      fill: none;
      animation: stroke-circle 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }
    .checkmark-check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      stroke-width: 3;
      stroke: #1a9d5c;
      fill: none;
      animation: stroke-check 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
    }
    @keyframes stroke-circle {
      100% { stroke-dashoffset: 0; }
    }
    @keyframes stroke-check {
      100% { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body class="page-pages page-pages-appointment-success">
  <div class="phone-screen page-pages-appointment-success">
    <div class="page data-v-baa6e4ef">
      
      <!-- Start Component hj-navbar -->
      <div class="component-hj-navbar">
        <div class="hj-navbar data-v-1529c78d is-fixed" style="height: 88px; background: #ffffff; border-bottom: 1px solid #f3f4f6;">
          <div class="data-v-1529c78d" style="height: 48px;"></div>
          <div class="hj-navbar-inner data-v-1529c78d" style="height: 40px;">
            <div class="hj-navbar-back data-v-1529c78d" style="color: #1f2937;" onclick="handleReturnHome()">
              <span class="hj-navbar-back-icon data-v-1529c78d" style="border-color: #1f2937;"></span>
            </div>
            <div class="hj-navbar-title data-v-1529c78d" style="color: #1f2937;">预约成功</div>
          </div>
        </div>
        <div class="data-v-1529c78d" style="height: 88px;"></div>
      </div>
      <!-- End Component hj-navbar -->

      <div class="page-content data-v-baa6e4ef">
        <!-- Premium Animated Checkmark Icon -->
        <div class="success-icon data-v-baa6e4ef">
          <svg class="checkmark-svg" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" />
            <path class="checkmark-check" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
          </svg>
        </div>
        
        <span class="success-title data-v-baa6e4ef">预约成功！</span>
        <span class="success-desc data-v-baa6e4ef">您已成功提交预约请求，请准时就诊</span>
        
        <!-- Summary Card -->
        <div class="summary-card data-v-baa6e4ef">
          <div class="summary-row data-v-baa6e4ef">
            <span class="summary-label data-v-baa6e4ef">预约单号</span>
            <span id="sum-no" class="summary-value summary-value--no data-v-baa6e4ef">AP-</span>
          </div>
          <div class="summary-row data-v-baa6e4ef">
            <span class="summary-label data-v-baa6e4ef">就诊门店</span>
            <span id="sum-store" class="summary-value data-v-baa6e4ef">鼾静健康·深圳旗舰中心</span>
          </div>
          <div class="summary-row data-v-baa6e4ef">
            <span class="summary-label data-v-baa6e4ef">就诊医生</span>
            <span id="sum-doctor" class="summary-value data-v-baa6e4ef">李明辉 (主任医师)</span>
          </div>
          <div class="summary-row data-v-baa6e4ef">
            <span class="summary-label data-v-baa6e4ef">就诊时间</span>
            <span id="sum-time" class="summary-value summary-value--bold data-v-baa6e4ef">2026-06-18 09:00-09:30</span>
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="actions data-v-baa6e4ef">
          <div class="component-hj-button">
            <button class="hj-button hj-button--primary hj-button--lg hj-button--block data-v-f6f93744" onclick="handleViewDetail()">
              <span class="hj-button-text">查看预约详情</span>
            </button>
          </div>
          
          <div class="component-hj-button" style="margin-top: 12px;">
            <button class="hj-button hj-button--ghost hj-button--lg hj-button--block data-v-f6f93744" onclick="handleReturnHome()">
              <span class="hj-button-text" style="color: #4b5563;">返回首页</span>
            </button>
          </div>
        </div>
        
        <div class="remind data-v-baa6e4ef">
          <span class="remind-text data-v-baa6e4ef">📱 就诊当天，我们将通过微信为您推送温馨提醒</span>
        </div>
      </div>
    </div>
  
        <div class="safe-bottom" style="height: 34px;"></div>
      </div>

  <script>
    // Parse URL query parameters
    const params = new URLSearchParams(window.location.search);
    const storeId = params.get('storeId') || 'store-001';
    const doctorId = params.get('doctorId') || 'doc-001';
    const date = params.get('date') || '2026-06-18';
    const timeSlot = params.get('timeSlot') || '09:00-09:30';
    const symptom = params.get('symptom') || '';

    const storeNames = {
      'store-001': '鼾静健康·深圳旗舰中心',
      'store-002': '鼾静健康·南山分中心',
      'store-003': '鼾静健康·宝安分中心'
    };
    const doctorNames = {
      'doc-001': '李明辉 (主任医师)',
      'doc-002': '王芳 (副主任医师)',
      'doc-003': '张伟 (副主任医师)'
    };

    // Retrieve or generate booking number
    const appointmentNo = params.get('appointmentNo') || (() => {
      const randomSuffix = String(Math.floor(1000 + Math.random() * 9000));
      const cleanDate = date.replace(/-/g, '');
      return `AP${cleanDate}${randomSuffix}`;
    })();
    document.getElementById('sum-no').textContent = appointmentNo;

    document.getElementById('sum-store').textContent = storeNames[storeId] || '鼾静健康·深圳旗舰中心';
    document.getElementById('sum-doctor').textContent = doctorNames[doctorId] || '李明辉 (主任医师)';
    document.getElementById('sum-time').textContent = `${date} ${timeSlot}`;

    // Pass appointment info to details view
    const detailQuery = `id=apt-new&appointmentNo=${appointmentNo}&storeId=${storeId}&doctorId=${doctorId}&date=${date}&timeSlot=${timeSlot}&symptom=${encodeURIComponent(symptom)}`;

    function handleViewDetail() {
      if (window.parent && window.parent.loadPage) {
        window.parent.loadPage(`pages/appointment/detail?${detailQuery}`);
      } else {
        window.location.href = `detail.html?${detailQuery}`;
      }
    }

    function handleReturnHome() {
      if (window.parent && window.parent.loadPage) {
        window.parent.loadPage('pages/index/index');
      } else {
        window.location.href = '../index/index.html';
      }
    }
  </script>
</body>
</html>
